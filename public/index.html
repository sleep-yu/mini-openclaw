<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniOpenClaw</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --accent: #e07020;
      --accent-hover: #ff8033;
      --bg: #f5f6fa;
      --bg-accent: #ffffff;
      --bg-elevated: #f0f1f5;
      --bg-hover: #e8e9ef;
      --card: #ffffff;
      --panel: #f5f6fa;
      --text: #1a1d2e;
      --text-strong: #0a0c14;
      --muted: #6b6f80;
      --border: #dcdde4;
      --border-strong: #c4c6d0;
      --ok: #2e7d32;
      --danger: #c62828;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
    }

    /* 顶部栏 */
    .topbar {
      height: 52px;
      background: var(--bg-accent);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.75rem;
    }

    .logo {
      font-size: 1.5rem;
    }

    .brand {
      font-weight: 600;
      color: var(--text-strong);
      font-size: 0.95rem;
    }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.connected {
      background: var(--ok);
    }

    .status-dot.disconnected {
      background: var(--danger);
    }

    /* 消息区域 */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 75%;
      padding: 0.875rem 1rem;
      border-radius: var(--radius-lg);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .message.assistant::before {
      content: "🦞";
      margin-right: 0.5rem;
      color: var(--accent);
    }

    /* 输入区 */
    .compose {
      padding: 1rem 1.5rem;
      background: var(--bg-accent);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      gap: 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.5rem;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
    }

    .input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-strong);
      font-size: 0.95rem;
      padding: 0.5rem;
    }

    .input-wrapper input::placeholder {
      color: var(--muted);
    }

    .send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 0.5rem 1.25rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 加载动画 */
    .message.typing-indicator {
      align-self: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.75rem 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message.typing-indicator::before {
      content: "🦞";
      color: var(--accent);
    }

    .typing {
      display: flex;
      gap: 4px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(-6px);
      }
    }

    /* 空状态 */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 1rem;
    }

    .empty-state .icon {
      font-size: 3rem;
    }

    /* Markdown 样式 */
    .message.assistant h1 { font-size: 1.1rem; font-weight: 600; margin: 0.75rem 0 0.5rem 0; }
    .message.assistant h2 { font-size: 1rem; font-weight: 600; margin: 0.75rem 0 0.5rem 0; }
    .message.assistant h3 { font-size: 0.95rem; font-weight: 600; margin: 0.5rem 0 0.25rem 0; }
    .message.assistant p { margin: 0.25rem 0; line-height: 1.6; }
    .message.assistant code { background: var(--bg-elevated); padding: 0.15rem 0.35rem; border-radius: 3px; font-size: 0.85rem; font-family: 'Consolas', 'Monaco', monospace; }
    .message.assistant pre { background: var(--bg-elevated); padding: 0.75rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; }
    .message.assistant pre code { background: none; padding: 0; font-size: 0.85rem; }
    .message.assistant ul, .message.assistant ol { margin: 0.25rem 0; padding-left: 1.5rem; }
    .message.assistant li { margin: 0.15rem 0; }
    .message.assistant strong { font-weight: 600; }
  </style>
</head>

<body>
  <div class="topbar">
    <span class="logo">🦞</span>
    <span class="brand">MiniOpenClaw</span>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">连接中...</span>
    </div>
  </div>

  <div class="chat">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <span class="icon">🦞</span>
        <span>开始对话吧</span>
      </div>
    </div>

    <div class="compose">
      <div class="input-wrapper">
        <input type="text" id="input" placeholder="输入消息..." />
        <button class="send-btn" id="send">发送</button>
      </div>
    </div>
  </div>

  <script>
    const ws = new WebSocket('ws://127.0.0.1:18788');
    const messages = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    let currentAssistantMsg = null;

    ws.onopen = () => {
      statusDot.className = 'status-dot connected';
      statusText.textContent = '已连接';
    };

    ws.onclose = () => {
      statusDot.className = 'status-dot disconnected';
      statusText.textContent = '已断开';
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      // 如果还没有创建当前会话的消息框，则创建
      if (!currentAssistantMsg) {
        removeTyping(); // 移除"正在输入"提示
        currentAssistantMsg = document.createElement('div');
        currentAssistantMsg.className = 'message assistant';
        currentAssistantMsg.dataset.content = '';
        messages.appendChild(currentAssistantMsg);
      }
      // 累积内容并渲染 Markdown
      currentAssistantMsg.dataset.content += data.content;
      currentAssistantMsg.innerHTML = marked.parse(currentAssistantMsg.dataset.content);
      messages.scrollTop = messages.scrollHeight;
    };

    function sendMessage() {
      const content = input.value.trim();
      if (!content) return;
      currentAssistantMsg = null;  // 添加这一行
      emptyState.style.display = 'none';
      addMessage(content, 'user');
      ws.send(JSON.stringify({ type: 'message', content }));
      input.value = '';
      showTyping();
    }

    function addMessage(content, role) {
      removeTyping();
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message typing-indicator';
      div.id = 'typingIndicator';
      div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
    }

    sendBtn.onclick = sendMessage;
    input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    input.focus();
  </script>
</body>

</html>
